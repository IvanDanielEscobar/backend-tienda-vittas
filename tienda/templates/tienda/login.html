{% extends 'tienda/base.html' %}

{% block title %}Ingresar - Vittas{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12 bg-white p-8 rounded-lg shadow-md border border-gray-100">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Iniciar Sesión</h2>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                
                <input type="{% if field.name == 'password' %}password{% else %}{{ field.field.widget.input_type }}{% endif %}" 
                       name="{{ field.html_name }}" 
                       class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                
                {% if field.errors %}
                    <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        
        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Ingresar
        </button>
    </form>
    
    <p class="mt-4 text-center text-sm text-gray-600">
        ¿No tenés cuenta? <a href="{% url 'registro' %}" class="font-medium text-indigo-600 hover:text-indigo-500">Registrate acá</a>
    </p>
</div>
{% endblock %}
