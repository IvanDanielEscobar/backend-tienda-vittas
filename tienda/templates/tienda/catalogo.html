{%  extends "tienda/base.html" %}

{% block title %}Catálogo de Productos{% endblock %}

{% block content %}
    <h1 class="text-3xl font-bold mb-6">Catálogo de Productos</h1>
    <div class="mb-6">
        <a href="{% url 'crear_producto' %}" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700">Agregar Producto</a>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        {% for producto in productos %}
            <div class="bg-white shadow-md rounded-lg overflow-hidden">
                <img src="{{ producto.imagen.url }}" alt="{{ producto.nombre }}" class="w-full h-48 object-cover">
                <div class="p-4">
                    <h2 class="text-xl font-semibold mb-2">{{ producto.nombre }}</h2>
                    <p class="text-gray-700 mb-2">${{ producto.precio }}</p>
                    <a href="{% url 'detalle_producto' producto.id %}" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700">Ver Detalles</a>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock %}
