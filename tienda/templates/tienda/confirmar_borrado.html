{% extends 'tienda/base.html' %}

{% block title %}Confirmar Eliminación - Vittas{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-16 bg-white p-8 rounded-2xl shadow-sm border border-red-100 text-center">
    <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-50 mb-4">
        <svg class="h-6 w-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
    </div>
    
    <h2 class="text-xl font-bold text-gray-900 mb-2">¿Estás absolutamente seguro?</h2>
    <p class="text-sm text-gray-500 mb-6">
        Esta acción eliminará de forma definitiva a <strong class="text-gray-800">"{{ object }}"</strong> de la base de datos. Esta operación no se puede deshacer.
    </p>
    
    <form method="post">
        {% csrf_token %}
        <div class="flex flex-col sm:flex-row-reverse gap-2">
            <button type="submit" class="w-full inline-flex justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 focus:outline-none sm:text-sm transition-colors">
                Sí, eliminar ahora
            </button>
            
            <button type="button" onclick="window.history.back();" class="w-full inline-flex justify-center rounded-lg border border-gray-200 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:text-sm transition-colors">
                No, cancelar
            </button>
        </div>
    </form>
</div>
{% endblock %}
